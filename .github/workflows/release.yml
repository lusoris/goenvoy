name: Release

on:
  push:
    tags:
      - '**/v[0-9].*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate tagged module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Determine module from tag
        id: module
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          module_path=$(echo "$tag" | sed 's|/v[0-9].*||')
          echo "path=./$module_path" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Module: $module_path, Tag: $tag"

      - name: Validate module builds
        working-directory: ${{ steps.module.outputs.path }}
        run: |
          go build ./...
          go vet ./...
          go test -race ./...
