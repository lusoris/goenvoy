name: Release

on:
  push:
    tags:
      - '**/v[0-9]*.[0-9]*.[0-9]*'
      - '**/v[0-9]*.[0-9]*.[0-9]*-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)release, e.g. anime/v1.3.0. Needed because release-please creates tags with GITHUB_TOKEN, which does not fire the push-tag trigger.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    name: Release tagged module
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create GH Release + upload artefacts
      id-token: write       # cosign keyless + SLSA
      attestations: write   # attest-build-provenance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Parse tag
        id: tag
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$DISPATCH_TAG" ]; then
            TAG="$DISPATCH_TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          MOD_PATH="${TAG%/v*}"
          VERSION="v${TAG##*/v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "module=$MOD_PATH" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dir=./$MOD_PATH" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
          cache-dependency-path: ${{ steps.tag.outputs.dir }}/go.mod

      - name: Validate the tagged module
        working-directory: ${{ steps.tag.outputs.dir }}
        run: |
          go build ./...
          go vet ./...
          go test -race -count=1 ./...

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Install syft
        env:
          SYFT_VERSION: v1.14.0
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/ccbee94b876240284c25c8931c6233fc71a5b7fb/install.sh \
            | sh -s -- -b /usr/local/bin "${SYFT_VERSION}"
          syft version

      - name: Package source tarball
        id: pkg
        env:
          MOD: ${{ steps.tag.outputs.module }}
          VER: ${{ steps.tag.outputs.version }}
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/dist"
          BASENAME="$(echo "$MOD" | tr '/' '_')_${VER}_source"
          TARBALL="${GITHUB_WORKSPACE}/dist/${BASENAME}.tar.gz"
          (cd "${MOD}" && \
             find . -type f -not -path './coverage.out' -not -name '*.out' \
             | sort | LC_ALL=C tar --owner=0 --group=0 --numeric-owner \
             --mtime='@0' --sort=name --no-recursion -czf "${TARBALL}" -T - )
          (cd "${GITHUB_WORKSPACE}/dist" && sha256sum "${BASENAME}.tar.gz" > "${BASENAME}.checksums.txt")
          echo "basename=${BASENAME}" >> "$GITHUB_OUTPUT"

      - name: SBOM (syft → SPDX)
        run: |
          syft packages dir:${{ steps.tag.outputs.dir }} -o spdx-json > dist/${{ steps.pkg.outputs.basename }}.sbom.spdx.json

      - name: Sign checksums (cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes \
            --output-signature dist/${{ steps.pkg.outputs.basename }}.checksums.txt.sig \
            --output-certificate dist/${{ steps.pkg.outputs.basename }}.checksums.txt.pem \
            dist/${{ steps.pkg.outputs.basename }}.checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: |
            dist/${{ steps.pkg.outputs.basename }}.tar.gz
            dist/${{ steps.pkg.outputs.basename }}.checksums.txt
            dist/${{ steps.pkg.outputs.basename }}.sbom.spdx.json

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          MOD: ${{ steps.tag.outputs.module }}
          VER: ${{ steps.tag.outputs.version }}
          BASENAME: ${{ steps.pkg.outputs.basename }}
        run: |
          # Release-please may have already created a bare release (notes
          # only, no artefacts) when it cut the tag — upload the signed
          # artefacts to that existing release instead of failing. The
          # push-tag trigger path still lands in the create branch since
          # no release exists yet at that point.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "dist/${BASENAME}.tar.gz" \
              "dist/${BASENAME}.checksums.txt" \
              "dist/${BASENAME}.checksums.txt.sig" \
              "dist/${BASENAME}.checksums.txt.pem" \
              "dist/${BASENAME}.sbom.spdx.json" \
              --clobber
          else
            gh release create "$TAG" \
              --title "$MOD $VER" \
              --generate-notes \
              "dist/${BASENAME}.tar.gz" \
              "dist/${BASENAME}.checksums.txt" \
              "dist/${BASENAME}.checksums.txt.sig" \
              "dist/${BASENAME}.checksums.txt.pem" \
              "dist/${BASENAME}.sbom.spdx.json"
          fi
