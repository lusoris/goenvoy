name: Release

on:
  push:
    tags:
      - '**/v[0-9].*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate tagged module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Determine module from tag
        id: module
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          module_path=$(echo "$tag" | sed 's|/v[0-9].*||')
          version=$(echo "$tag" | grep -oP 'v[0-9].*')
          echo "path=./$module_path" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "module_path=$module_path" >> "$GITHUB_OUTPUT"
          echo "Module: $module_path, Tag: $tag, Version: $version"

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: ${{ steps.module.outputs.path }}/go.mod

      - name: Validate module builds
        working-directory: ${{ steps.module.outputs.path }}
        run: |
          go build ./...
          go vet ./...
          go test -race ./...

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.module.outputs.tag }}
          name: ${{ steps.module.outputs.module_path }} ${{ steps.module.outputs.version }}
          generate_release_notes: true
