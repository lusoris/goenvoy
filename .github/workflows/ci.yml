name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: PR title (Conventional Commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -qE '^(feat|fix|docs|chore|refactor|test|perf|ci|build|revert|style)(\(.+\))?(!)?: .+'; then
            echo "::error::PR title does not follow Conventional Commits."
            echo "::error::Got: $PR_TITLE"
            echo "::error::Expected: <type>(<scope>): <description>"
            exit 1
          fi
          echo "OK: $PR_TITLE"

  discover:
    name: Discover modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
    steps:
      - uses: actions/checkout@v6
      - id: find
        name: Find all Go modules
        run: |
          modules=$(find . -name 'go.mod' -not -path './.workingdir/*' -exec dirname {} \; | sort | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "modules=$modules" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint ${{ matrix.module }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: ${{ matrix.module }}/go.mod
      - name: Run go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: ${{ matrix.module }}
          args: --config=${{ github.workspace }}/.golangci.yml --timeout=5m

  vuln:
    name: Vulnerabilities ${{ matrix.module }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: ${{ matrix.module }}/go.mod
      - name: govulncheck
        working-directory: ${{ matrix.module }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  test:
    name: Test ${{ matrix.module }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: ${{ matrix.module }}/go.mod
      - name: Run tests
        working-directory: ${{ matrix.module }}
        run: go test -race -count=1 -timeout=5m -coverprofile=coverage.out -covermode=atomic ./...
      - name: Coverage threshold
        env:
          MODULE: ${{ matrix.module }}
        run: |
          if [ ! -s "${MODULE}/coverage.out" ]; then
            echo "no coverage.out — skipping threshold check"
            exit 0
          fi
          MOD_KEY="${MODULE#./}"
          THRESHOLD=$(jq -r --arg k "$MOD_KEY" '.overrides[$k] // .default' tools/coverage-thresholds.json)
          COV=$(go tool cover -func="${MODULE}/coverage.out" | awk '/^total/{gsub("%","",$3); print $3}')
          if [ -z "$COV" ]; then
            echo "no 'total' line in coverage.out (module has no testable code) — skipping threshold check"
            exit 0
          fi
          # When a module has only type/const declarations (no executable
          # statements), go tool cover reports 0.0% and coverage.out has
          # just the mode header — nothing to measure. Skip the gate.
          if [ "$COV" = "0.0" ]; then
            cov_lines=$(grep -cv '^mode:' "${MODULE}/coverage.out" || true)
            if [ "$cov_lines" -eq 0 ]; then
              echo "coverage.out has only the mode header (no executable statements in module) — skipping threshold check"
              exit 0
            fi
          fi
          echo "Coverage for ${MOD_KEY}: ${COV}% (threshold ${THRESHOLD}%)"
          if awk -v c="$COV" -v t="$THRESHOLD" 'BEGIN { exit !(c+0 < t+0) }'; then
            echo "::error::${MOD_KEY} coverage ${COV}% < ${THRESHOLD}% — add tests or raise the override (only when intentional)"
            exit 1
          fi
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ hashFiles(format('{0}/go.mod', matrix.module)) }}
          path: ${{ matrix.module }}/coverage.out
          retention-days: 7

  build:
    name: Build ${{ matrix.module }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: ${{ matrix.module }}/go.mod
      - working-directory: ${{ matrix.module }}
        run: go build ./...

  apidiff:
    name: apidiff ${{ matrix.module }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: ${{ matrix.module }}/go.mod
      - name: Install apidiff
        run: go install golang.org/x/exp/cmd/apidiff@latest
      - name: Run apidiff for ${{ matrix.module }}
        env:
          MODULE_DIR: ${{ matrix.module }}
        run: |
          set -euo pipefail
          MOD_PATH=${MODULE_DIR#./}
          TAG_PREFIX="${MOD_PATH}/v"
          PREV_TAG=$(git tag --list --sort=-v:refname "${TAG_PREFIX}*" | head -1 || true)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous ${TAG_PREFIX}* tag — skipping (first release)."
            exit 0
          fi

          PREV_SHA=$(git rev-parse "$PREV_TAG^{commit}")
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "$PREV_SHA" = "$HEAD_SHA" ]; then
            echo "PREV_TAG $PREV_TAG already at HEAD — nothing to diff."
            exit 0
          fi

          # Source-only fast path: if no .go file under $MOD_PATH changed
          # between PREV_TAG and HEAD, the public surface can't have moved.
          if git diff --quiet "$PREV_TAG" HEAD -- "$MOD_PATH/*.go" "$MOD_PATH/**/*.go"; then
            echo "No .go changes in $MOD_PATH since $PREV_TAG — skipping apidiff."
            exit 0
          fi

          echo "Comparing $MOD_PATH against $PREV_TAG"

          MOD_IMPORT=$(cd "$MOD_PATH" && go list -m)

          # Use a detached worktree for the previous tag so we never mutate
          # the primary checkout (cleaner than stash + checkout).
          PREV_WT=$(mktemp -d)
          git worktree add --detach --quiet "$PREV_WT" "$PREV_TAG"
          trap 'git worktree remove --force "$PREV_WT" >/dev/null 2>&1 || true' EXIT

          # If the module path has been renamed between PREV_TAG and HEAD
          # (lusoris → golusoris, or a /vN major-version path bump), apidiff
          # can't load the old fingerprint under the new name. A rename is
          # a breaking change by definition, so it's on the release author
          # to cut a new baseline tag — we skip the gate until one exists.
          PREV_MOD_IMPORT=$(cd "$PREV_WT/$MOD_PATH" && go list -m)
          if [ "$PREV_MOD_IMPORT" != "$MOD_IMPORT" ]; then
            echo "Module path changed ($PREV_MOD_IMPORT → $MOD_IMPORT) — tag a fresh baseline on the new path before apidiff can resume. Skipping."
            exit 0
          fi

          apidiff -m "$MOD_IMPORT" "$PREV_WT/$MOD_PATH" > /tmp/prev.txt
          apidiff -m "$MOD_IMPORT" "$MOD_PATH"          > /tmp/current.txt

          if [ ! -s /tmp/prev.txt ] || [ ! -s /tmp/current.txt ]; then
            echo "::error::apidiff produced an empty fingerprint (prev=$(stat -c%s /tmp/prev.txt) current=$(stat -c%s /tmp/current.txt)) — investigate the previous-tag build."
            exit 1
          fi

          if ! apidiff /tmp/prev.txt /tmp/current.txt; then
            echo "::error::Breaking API change in $MOD_PATH vs $PREV_TAG — add a 'BREAKING CHANGE:' + 'Migration:' footer or bump major."
            exit 1
          fi
          echo "API backwards-compatible with $PREV_TAG."

  status:
    name: CI Status
    if: always()
    needs: [lint, vuln, test, build, apidiff]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          for j in lint vuln test build apidiff; do
            case "$(eval echo \$${j}_result)" in ""|success|skipped) ;; *)
              echo "job $j: $(eval echo \$${j}_result)"; exit 1 ;;
            esac
          done
          echo "All checks passed."
        env:
          lint_result: ${{ needs.lint.result }}
          vuln_result: ${{ needs.vuln.result }}
          test_result: ${{ needs.test.result }}
          build_result: ${{ needs.build.result }}
          apidiff_result: ${{ needs.apidiff.result }}
