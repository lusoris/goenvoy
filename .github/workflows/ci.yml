name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  discover:
    name: Discover modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
    steps:
      - uses: actions/checkout@v6

      - id: find
        name: Find all Go modules
        run: |
          modules=$(find . -name 'go.mod' -not -path './.workingdir/*' -exec dirname {} \; | sort | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "modules=$modules" >> "$GITHUB_OUTPUT"

  test:
    name: Test ${{ matrix.module }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run tests
        working-directory: ${{ matrix.module }}
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ hashFiles(format('{0}/go.mod', matrix.module)) }}
          path: ${{ matrix.module }}/coverage.out
          retention-days: 7

  lint:
    name: Lint ${{ matrix.module }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: ${{ matrix.module }}

  status:
    name: CI Status
    if: always()
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}" != "success" || "${{ needs.lint.result }}" != "success" ]]; then
            echo "CI failed: test=${{ needs.test.result }}, lint=${{ needs.lint.result }}"
            exit 1
          fi
          echo "All checks passed."
