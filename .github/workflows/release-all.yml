name: Release All Modules

# Fan-out workflow: validates every module, then pushes one tag per module
# at the requested version. Each tag push fires .github/workflows/release.yml,
# which does the heavy lifting (cosign keyless, syft SBOM, SLSA-L3 provenance,
# GH Release with signed artefacts).
#
# Use this when bumping every module to the same version in lockstep.
# For single-module releases, tag manually (or via /release-module skill).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version to release across all modules (e.g. v2.1.0)'
        required: true
        type: string
      dry-run:
        description: 'Validate only, do not create or push tags'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  fan-out:
    name: Validate + tag every module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "::error::Invalid version: $VERSION (expected vX.Y.Z[-pre])"
            exit 1
          fi

      - name: Discover modules
        id: discover
        run: |
          modules=$(find . -name 'go.mod' -not -path './.workingdir*/*' -exec dirname {} \; | sed 's|^\./||' | sort)
          count=$(echo "$modules" | wc -l)
          echo "Found $count modules"
          {
            echo "modules<<EOF"
            echo "$modules"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate every module (build + vet + test)
        run: |
          failed=0
          while IFS= read -r mod; do
            [ -z "$mod" ] && continue
            echo "::group::Validating $mod"
            if ! (cd "$mod" && go build ./... && go vet ./... && go test -race -count=1 -timeout=5m ./...); then
              echo "::error::Validation failed for $mod"
              failed=1
            fi
            echo "::endgroup::"
          done <<< "${{ steps.discover.outputs.modules }}"
          [ "$failed" -ne 0 ] && exit 1
          echo "All modules validated."

      - name: Push tags (fans out to release.yml)
        if: ${{ !inputs.dry-run }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          created=0
          skipped=0
          while IFS= read -r mod; do
            [ -z "$mod" ] && continue
            tag="${mod}/${VERSION}"
            if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
              echo "tag $tag already exists — skipped"
              skipped=$((skipped + 1))
              continue
            fi
            git tag "$tag"
            git push origin "$tag"
            echo "pushed $tag"
            created=$((created + 1))
          done <<< "${{ steps.discover.outputs.modules }}"
          {
            echo "### Fan-out summary"
            echo "- **Version:** $VERSION"
            echo "- **Tags pushed:** $created"
            echo "- **Skipped (already existed):** $skipped"
            echo
            echo "Each pushed tag triggers \`.github/workflows/release.yml\` —"
            echo "watch the Actions tab for cosign + SBOM + SLSA-attested releases."
          } >> "$GITHUB_STEP_SUMMARY"
