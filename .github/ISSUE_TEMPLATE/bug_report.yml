name: Bug Report
description: Report a bug in a goenvoy module
title: "[BUG] "
labels: [bug]
body:
  - type: input
    id: module
    attributes:
      label: Module
      description: Which module is affected? (e.g. `arr/sonarr`, `metadata/video/tmdb`)
      placeholder: arr/sonarr
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Create client with `...`
        2. Call `...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages if applicable.
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: "1.26.1"
    validations:
      required: true

  - type: input
    id: module-version
    attributes:
      label: goenvoy module version
      placeholder: "v2.0.0"

  - type: input
    id: target-version
    attributes:
      label: Target service version (if relevant)

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem.
